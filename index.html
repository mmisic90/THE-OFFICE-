<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>The Office — Kancelarija Mišić</title>
<meta name="theme-color" content="#0f5132">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Office">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    /* The Office — Redizajn A · zelena dominantna + narandžasti (BTC/Claude) akcenat */
    --green-900:#0b3d24; --green-800:#0f5132; --green-700:#147a47; --green-600:#1a9255;
    --green-500:#22b066; --green-50:#e8f6ee; --green-100:#d4eedf;
    /* legacy aliasi koje JS/CSS i dalje koriste */
    --indigo:#0f5132; --indigo-600:#0b3d24; --indigo-50:#e8f6ee;
    --brand-2:#1a9255; --brand-dk:#0b3d24;
    --accent:#f7931a; --accent-600:#e07c00; --accent-700:#b35e00; --accent-50:#fff4e2; --accent-ink:#8a4b00;
    --red:#d23b3b; --red-50:#fdecec;
    --orange:#ef6c00; --orange-50:#fff4e5;
    --green:#1a9255;
    --bg:#eef4ef; --bg-2:#e3eee7; --card:#ffffff; --ink:#10241a; --muted:#5d7166;
    --line:#dce8e0; --line-2:#caddd2;
    --shadow:0 2px 6px rgba(13,48,30,.06),0 1px 2px rgba(13,48,30,.05);
    --shadow-md:0 10px 28px rgba(13,48,30,.12);
    --shadow-lg:0 22px 50px rgba(13,48,30,.20);
    --radius:18px; --radius-sm:12px; --radius-lg:22px;
    --grad-brand:linear-gradient(135deg,#0b3d24 0%,#147a47 55%,#1a9255 100%);
    --grad-brand-soft:linear-gradient(135deg,#0f5132 0%,#1a9255 100%);
    --grad-accent:linear-gradient(135deg,#ffb24d 0%,#f7931a 48%,#e07c00 100%);
    --glow-accent:0 8px 24px rgba(247,147,26,.45);
    --ring-green:0 0 0 4px rgba(26,146,85,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:
      radial-gradient(900px 500px at 100% -5%, rgba(247,147,26,.07), transparent 55%),
      radial-gradient(900px 600px at -10% 0%, rgba(26,146,85,.08), transparent 50%),
      var(--bg);
    background-attachment:fixed;
    color:var(--ink); line-height:1.5; font-size:15px; -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; letter-spacing:-.01em}

  /* ===== HEADER ===== */
  header{
    position:sticky; top:0; z-index:50; background:var(--grad-brand);
    color:#fff; padding:14px 18px; display:flex; align-items:center;
    justify-content:space-between; gap:10px; overflow:hidden;
    box-shadow:0 8px 26px rgba(11,61,36,.30);
  }
  header::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(420px 160px at 88% -40%, rgba(247,147,26,.42), transparent 70%);
  }
  header::after{
    content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
    background:var(--grad-accent); box-shadow:0 0 14px rgba(247,147,26,.55);
  }
  .brand{display:flex; align-items:center; gap:12px; min-width:0; position:relative; z-index:1}
  .brand-logo{
    width:44px; height:44px; border-radius:14px; flex-shrink:0;
    background:linear-gradient(160deg,rgba(255,255,255,.22),rgba(255,255,255,.06));
    border:1.5px solid rgba(255,255,255,.32);
    display:grid; place-items:center; font-size:21px; position:relative;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 4px 12px rgba(0,0,0,.18);
  }
  .brand-logo::after{
    content:''; position:absolute; right:-4px; bottom:-4px; width:14px; height:14px;
    border-radius:50%; background:var(--grad-accent); border:2.5px solid #0f5132;
    box-shadow:0 0 10px rgba(247,147,26,.7);
  }
  .brand-txt{display:flex; flex-direction:column; min-width:0}
  .brand-txt b{font-size:17px; font-weight:800; letter-spacing:-.03em; white-space:nowrap}
  .brand-txt span{font-size:11px; opacity:.82; font-weight:500}
  .hdr-dt{display:flex; align-items:baseline; gap:8px; margin-top:5px; white-space:nowrap}
  .hdr-date{font-size:14px; font-weight:700; letter-spacing:-.01em; opacity:1}
  .hdr-clock{font-size:12.5px; font-weight:600; opacity:.92;
    background:rgba(255,255,255,.14); padding:1px 7px; border-radius:999px}
  .nick{color:var(--accent); font-weight:700; font-size:.85em}
  .tagline{font-size:15px; font-style:italic; color:var(--green-700); font-weight:600; margin:2px 0 10px}
  .user-chip{
    display:flex; align-items:center; gap:8px;
    background:linear-gradient(160deg,rgba(255,255,255,.22),rgba(255,255,255,.08));
    padding:7px 12px 7px 8px; border-radius:999px; cursor:pointer;
    border:1px solid rgba(255,255,255,.22); position:relative; z-index:1;
    color:#fff; font-size:13px; font-weight:600; white-space:nowrap;
    transition:transform .15s ease, background .15s ease;
  }
  .user-chip:hover{background:rgba(255,255,255,.28); transform:translateY(-1px)}
  .user-chip:active{transform:translateY(0)}
  .avatar{
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(160deg,#fff,#e8f6ee); color:var(--green-800);
    display:grid; place-items:center; font-size:11px; font-weight:800; flex-shrink:0;
    box-shadow:0 1px 3px rgba(0,0,0,.18);
  }

  /* ===== LOGIN SCREEN ===== */
  .login{
    min-height:100vh; display:grid; place-items:center; padding:24px; position:relative; overflow:hidden;
    background:
      radial-gradient(1100px 480px at 50% -12%, rgba(247,147,26,.30), transparent 60%),
      radial-gradient(800px 520px at 110% 110%, rgba(34,176,102,.35), transparent 55%),
      linear-gradient(160deg,#072d1a 0%,#0f5132 52%,#147a47 100%);
  }
  .login-card{
    background:rgba(255,255,255,.98); border-radius:var(--radius-lg); padding:36px 28px 30px; max-width:430px; width:100%;
    box-shadow:var(--shadow-lg); text-align:center; position:relative; border:1px solid rgba(255,255,255,.6);
  }
  .login-card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:5px;
    border-radius:var(--radius-lg) var(--radius-lg) 0 0; background:var(--grad-accent);
  }
  .login-logo{
    width:72px; height:72px; margin:6px auto 16px; border-radius:22px; position:relative;
    background:var(--grad-brand); display:grid; place-items:center; font-size:34px;
    box-shadow:0 12px 28px rgba(11,61,36,.40), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .login-logo::after{
    content:''; position:absolute; right:-5px; bottom:-5px; width:22px; height:22px;
    border-radius:50%; background:var(--grad-accent); border:3px solid #fff; box-shadow:var(--glow-accent);
  }
  .login-card h1{font-size:25px; color:var(--green-800); letter-spacing:-.03em; margin-bottom:4px; font-weight:800}
  .login-card .sub{color:var(--muted); font-size:13px; margin-bottom:26px; font-weight:500}
  .who{font-size:12px; font-weight:700; color:var(--muted); text-align:left; margin-bottom:10px;
    text-transform:uppercase; letter-spacing:.08em}
  .people{display:flex; flex-direction:column; gap:9px}
  .person-btn{
    display:flex; align-items:center; gap:13px; padding:13px 15px; border:1.5px solid var(--line);
    border-radius:16px; background:#fff; cursor:pointer; text-align:left; width:100%;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .person-btn:hover{border-color:var(--green-600); background:var(--green-50);
    transform:translateY(-2px); box-shadow:0 10px 22px rgba(15,81,50,.14)}
  .person-btn:active{transform:translateY(0)}
  .person-btn .avatar{width:40px; height:40px; font-size:15px; background:var(--grad-brand-soft); color:#fff}
  .person-btn .pi b{display:block; font-size:15px; color:var(--ink); font-weight:700}
  .person-btn .pi span{font-size:12px; color:var(--muted)}

  /* ===== APP LAYOUT ===== */
  .app{display:none}
  .app.active{display:block}
  main{max-width:980px; margin:0 auto; padding:18px 16px; padding-bottom:104px}

  /* toolbar */
  .toolbar{display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin-bottom:16px}
  .seg{display:flex; flex-wrap:wrap; background:#fff; border:1px solid var(--line);
    border-radius:999px; padding:4px; gap:3px; box-shadow:var(--shadow)}
  .seg button{
    border:none; background:none; padding:8px 14px; border-radius:999px; font-size:13px;
    font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap; font-family:inherit;
    transition:color .15s ease, background .15s ease, transform .12s ease;
  }
  .seg button:hover{color:var(--green-800)}
  .seg button:active{transform:scale(.96)}
  .seg button.on{background:var(--grad-brand); color:#fff; box-shadow:0 4px 12px rgba(15,81,50,.34)}
  .spacer{flex:1}
  .btn{
    border:none; border-radius:999px; padding:10px 16px; font-size:13px; font-weight:700;
    cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-family:inherit;
    transition:transform .14s ease, box-shadow .16s ease, filter .15s ease, background .15s ease;
  }
  .btn:active{transform:translateY(1px) scale(.985)}
  /* sekundarno dugme — zeleni outline */
  .btn-ghost{background:#fff; border:1.5px solid var(--green-100); color:var(--green-800)}
  .btn-ghost:hover{border-color:var(--green-600); color:var(--green-700); box-shadow:0 6px 16px rgba(15,81,50,.12)}
  /* primarni CTA — narandžasti gradijent sa glow-om */
  .btn-primary{
    background:var(--grad-accent); color:#fff; box-shadow:var(--glow-accent);
    text-shadow:0 1px 1px rgba(140,70,0,.35);
  }
  .btn-primary:hover{filter:brightness(1.05); box-shadow:0 12px 30px rgba(247,147,26,.55); transform:translateY(-1px)}
  .btn-primary:active{transform:translateY(1px); box-shadow:0 4px 12px rgba(247,147,26,.4)}

  select.sort{
    border:1.5px solid var(--green-100); background:#fff; border-radius:999px; padding:9px 14px;
    font-size:13px; font-weight:700; color:var(--green-800); cursor:pointer; font-family:inherit;
  }
  select.sort:hover{border-color:var(--green-600)}

  /* stats row — dashboard hero */
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px}
  .stat{position:relative; background:#fff; border:1px solid var(--line);
    border-radius:var(--radius-sm); padding:15px 14px 14px; box-shadow:var(--shadow); overflow:hidden;
    transition:transform .16s ease, box-shadow .18s ease}
  .stat::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--line)}
  .stat::after{content:''; position:absolute; right:-24px; top:-24px; width:64px; height:64px;
    border-radius:50%; opacity:.10; background:currentColor}
  .stat:hover{transform:translateY(-3px); box-shadow:var(--shadow-md)}
  .stat .n{font-size:27px; font-weight:800; letter-spacing:-.03em; line-height:1}
  .stat .l{font-size:11px; color:var(--muted); margin-top:6px; font-weight:600; letter-spacing:.01em}
  .stat.urgent{color:var(--red); background:linear-gradient(180deg,#fdf0f0,#fff)}
  .stat.urgent::before{background:var(--red)}
  .stat.urgent .n{color:var(--red)}
  .stat.today{color:var(--accent-600)}
  .stat.today::before{background:var(--grad-accent)}
  .stat.today .n{color:var(--accent-600)}
  .stat.week{color:var(--green-600)}
  .stat.week::before{background:var(--green-500)}
  .stat.week .n{color:var(--green-600)}
  .stat.total{color:var(--green-800)}
  .stat.total::before{background:var(--grad-brand)}
  .stat.total .n{color:var(--green-800)}

  /* group header */
  .group-h{font-size:12px; font-weight:800; color:var(--green-800); text-transform:uppercase;
    letter-spacing:.06em; margin:20px 4px 10px; display:flex; align-items:center; gap:8px}
  .group-h .count{background:var(--green-50); color:var(--green-700); border-radius:999px; padding:2px 9px; font-size:11px; font-weight:700}

  /* task card */
  .task{
    position:relative; background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:15px 16px; margin-bottom:11px; cursor:pointer;
    box-shadow:var(--shadow); overflow:hidden;
    transition:transform .16s ease, box-shadow .18s ease, border-color .15s ease;
  }
  .task::before{content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--line)}
  .task:hover{transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--line-2)}
  .task.due-over::before{background:var(--red)}
  .task.due-soon::before{background:var(--grad-accent)}
  .task.due-ok::before{background:var(--green-500)}
  .task.done{opacity:.6}
  .task.done .t-title{text-decoration:line-through}

  .t-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:9px}
  .t-title{font-size:15.5px; font-weight:700; letter-spacing:-.02em}
  .t-num{font-size:12px; font-weight:700; color:var(--green-800); background:var(--green-50);
    padding:2px 9px; border-radius:7px; display:inline-block; margin-top:4px}
  .t-badge{font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; white-space:nowrap; flex-shrink:0}
  .b-akt{background:var(--green-50); color:var(--green-700)}
  .b-odg{background:#e3f2fd; color:#1565c0}
  .b-izv{background:#ede7f6; color:#5e35b1}
  .b-kriv{background:#fce4ec; color:#c2185b}
  .b-poziv{background:var(--accent-50); color:var(--accent-700)}
  .b-admin{background:#eceff1; color:#546e7a}
  .b-other{background:#eef2ef; color:#5d7166}
  .b-rociste{background:#ede7f6; color:#5e35b1}
  .task.kind-rociste{background:linear-gradient(180deg,#faf8ff,#fff)}
  .t-hear{margin-top:9px; font-size:12.5px; font-weight:600; color:#5e35b1; background:#f4f0fc;
    border-radius:10px; padding:8px 11px; border:1px solid #e4daf6; display:flex; flex-wrap:wrap; gap:4px 12px}

  .t-meta{display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-size:12px; color:var(--muted)}
  .t-rok{display:inline-flex; align-items:center; gap:5px; font-weight:700}
  .t-rok.over{color:var(--red)} .t-rok.soon{color:var(--accent-700)} .t-rok.ok{color:var(--green-600)}
  .t-who{display:inline-flex; align-items:center; gap:5px}
  .t-who .avatar{width:20px; height:20px; font-size:9px; background:var(--grad-brand-soft); color:#fff}
  .t-note{margin-top:9px; font-size:13px; color:var(--muted); background:var(--green-50);
    border-radius:10px; padding:9px 11px; border:1px solid var(--green-100)}
  .t-status{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px}
  .st-otvoreno{background:var(--green-50); color:var(--green-700)}
  .st-utoku{background:var(--accent-50); color:var(--accent-700)}
  .st-gotovo{background:#e6f4ec; color:var(--green-600)}

  .empty{text-align:center; padding:64px 20px; color:var(--muted)}
  .empty .big{font-size:46px; margin-bottom:14px; filter:drop-shadow(0 6px 12px rgba(15,81,50,.18))}
  .empty b{display:block; color:var(--ink); margin-bottom:4px; font-size:16px; font-weight:700}

  /* FAB */
  .fab{
    position:fixed; right:20px; bottom:20px; z-index:40;
    background:var(--grad-accent); color:#fff; border:none; border-radius:999px;
    padding:16px 24px; font-size:15px; font-weight:800; letter-spacing:-.01em; cursor:pointer;
    font-family:inherit; text-shadow:0 1px 1px rgba(140,70,0,.35);
    box-shadow:var(--glow-accent), 0 2px 6px rgba(0,0,0,.12); display:inline-flex; align-items:center; gap:8px;
    transition:transform .16s ease, box-shadow .18s ease, filter .15s ease;
  }
  .fab:hover{filter:brightness(1.05); box-shadow:0 14px 34px rgba(247,147,26,.6); transform:translateY(-2px)}
  .fab:active{transform:translateY(0) scale(.97); box-shadow:0 6px 16px rgba(247,147,26,.45)}

  /* MODAL */
  .overlay{
    position:fixed; inset:0; background:rgba(7,28,17,.58); z-index:100;
    display:none; align-items:flex-end; justify-content:center; padding:0;
    backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
  }
  .overlay.open{display:flex}
  .modal{
    background:#fff; border-radius:var(--radius-lg) var(--radius-lg) 0 0; width:100%; max-width:560px;
    max-height:92vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:slideUp .28s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideUp{from{transform:translateY(48px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .modal-h{position:sticky; top:0; background:#fff; padding:20px 22px 15px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; z-index:2}
  .modal-h b{font-size:18px; letter-spacing:-.03em; font-weight:800; color:var(--green-800)}
  .x{border:none; background:var(--green-50); width:32px; height:32px; border-radius:10px; cursor:pointer;
    font-size:16px; color:var(--green-700); transition:background .15s ease, transform .12s ease}
  .x:hover{background:var(--green-100)} .x:active{transform:scale(.92)}
  .modal-body{padding:18px 22px 24px}
  /* kindSeg — moderni pill toggle preko cele širine */
  #kindSeg{width:100%; background:var(--green-50); border-color:var(--green-100)}
  #kindSeg button{flex:1 1 0; text-align:center; padding:10px 8px; font-weight:700}
  #kindSeg button.on{background:var(--grad-brand); color:#fff; box-shadow:0 4px 12px rgba(15,81,50,.34)}
  .field{margin-bottom:16px}
  .field label{display:block; font-size:13px; font-weight:700; margin-bottom:7px; color:var(--ink)}
  .field .hint{font-size:11px; color:var(--muted); font-weight:500; margin-left:6px}
  .field input,.field select,.field textarea{
    width:100%; border:1.5px solid var(--line); border-radius:12px; padding:12px 13px;
    font-size:15px; font-family:inherit; color:var(--ink); background:#fbfdfb; transition:.15s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none; border-color:var(--green-600); box-shadow:var(--ring-green); background:#fff;
  }
  .field textarea{resize:vertical; min-height:64px}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .modal-foot{display:flex; gap:10px; padding:16px 22px; border-top:1px solid var(--line);
    position:sticky; bottom:0; background:#fff}
  .modal-foot .btn{flex:1; justify-content:center; padding:13px}
  .btn-danger{background:var(--red-50); color:var(--red); border:1.5px solid #f5d3d3}
  .btn-danger:hover{background:#fadbdb}

  /* import toast */
  .toast{position:fixed; top:74px; left:50%; transform:translateX(-50%); z-index:200;
    background:var(--grad-brand-soft); color:#fff; padding:13px 22px; border-radius:14px; font-size:14px;
    font-weight:700; box-shadow:var(--shadow-lg); display:none; max-width:90%}
  .toast.show{display:block; animation:slideUp .25s}
  .toast.err{background:linear-gradient(135deg,#d23b3b,#b32626)}

  /* pending badge na segmentu */
  .pend-badge{background:var(--grad-accent); color:#fff; border-radius:999px; padding:1px 7px; font-size:10px; margin-left:5px; font-weight:800; box-shadow:0 2px 6px rgba(247,147,26,.4)}

  /* approval na kartici */
  .t-pending::before{background:#7e57c2!important}
  .t-pending{background:linear-gradient(180deg,#f8f5fe,#fff)}
  .pend-tag{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
    color:#5e35b1; background:#ede7f6; padding:4px 10px; border-radius:999px}
  .approve-bar{display:flex; gap:8px; margin-top:11px; padding-top:11px; border-top:1px dashed var(--line)}
  .btn-approve{flex:1; background:var(--grad-brand-soft); color:#fff; border:none; border-radius:999px; padding:10px;
    font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
    display:inline-flex; align-items:center; justify-content:center; gap:6px; transition:transform .14s ease, filter .15s ease}
  .btn-approve:hover{filter:brightness(1.06)} .btn-approve:active{transform:scale(.97)}
  .btn-approve:disabled{background:#cfd9d2; color:#8a988f; cursor:not-allowed; filter:none}
  .approve-note{font-size:11px; color:var(--muted); text-align:center; padding:7px; font-style:italic}

  /* KALENDAR */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px}
  .cal-nav{display:flex; gap:6px; align-items:center}
  .cal-nav button{border:1.5px solid var(--green-100); background:#fff; width:36px; height:36px; border-radius:11px;
    cursor:pointer; font-size:16px; color:var(--green-700); font-weight:700; font-family:inherit;
    transition:background .15s ease, transform .12s ease}
  .cal-nav button:hover{background:var(--green-50); border-color:var(--green-600)} .cal-nav button:active{transform:scale(.94)}
  .cal-range{font-size:14px; font-weight:800; color:var(--green-800); letter-spacing:-.01em}
  .cal-grid{display:grid; grid-template-columns:1fr; gap:9px}
  .cal-day{background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:var(--shadow)}
  .cal-day.today{border-color:var(--green-600); box-shadow:var(--ring-green)}
  .cal-day.weekend .cal-day-h{background:#fff6ea}
  .cal-day-h{display:flex; align-items:center; justify-content:space-between; padding:10px 13px;
    background:var(--green-50); border-bottom:1px solid var(--line)}
  .cal-day-h .dname{font-size:13px; font-weight:700}
  .cal-day-h .dname small{font-weight:500; color:var(--muted); margin-left:6px}
  .cal-day-h.today-h .dname{color:var(--green-800)}
  .cal-day-h .dcount{font-size:11px; color:#fff; font-weight:800; background:var(--green-600);
    min-width:18px; height:18px; border-radius:999px; display:inline-grid; place-items:center; padding:0 5px}
  .cal-day-h .dcount:empty{display:none}
  .cal-items{padding:8px}
  .cal-empty{padding:10px 12px; font-size:12px; color:#a9b6ae; font-style:italic}
  .cal-item{display:flex; align-items:center; gap:9px; padding:9px; border-radius:10px; cursor:pointer; transition:background .12s ease}
  .cal-item:hover{background:var(--green-50)}
  .cal-item .ci-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0; box-shadow:0 0 0 3px rgba(0,0,0,.04)}
  .ci-over{background:var(--red)} .ci-soon{background:var(--accent)} .ci-ok{background:var(--green-500)} .ci-pend{background:#7e57c2}
  .cal-item .ci-body{flex:1; min-width:0}
  .cal-item .ci-type{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cal-item .ci-sub{font-size:11px; color:var(--muted)}
  .cal-item .ci-num{font-size:11px; font-weight:700; color:var(--green-800)}
  .ci-rociste{background:#7e57c2}
  @media(min-width:760px){
    .cal-grid{grid-template-columns:repeat(7,1fr); gap:7px}
    .cal-day-h{flex-direction:column; align-items:flex-start; gap:3px; min-height:50px}
    .cal-item{flex-direction:column; align-items:flex-start; gap:4px; padding:7px}
    .cal-item .ci-type{font-size:11px; white-space:normal}
  }

  /* desktop tweaks */
  @media(min-width:720px){
    .overlay{align-items:center; padding:24px}
    .modal{border-radius:var(--radius-lg)}
    .fab{padding:15px 24px}
  }
  @media(max-width:480px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .brand b{font-size:16px}
    .toolbar .seg{width:100%}
    .seg button{flex:1 1 auto; padding:8px 6px; text-align:center}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">⚖️</div>
    <h1>The Office</h1>
    <div class="tagline">nismo povezani ??</div>
    <div class="sub">Kancelarija Mišić · zadaci i rokovi</div>
    <div class="who">Ko si ti?</div>
    <div class="people" id="peopleList"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="appScreen">
  <header>
    <div class="brand">
      <span class="brand-logo">⚖️</span>
      <span class="brand-txt"><b>The Office</b><span>Kancelarija Mišić</span><span class="hdr-dt"><span class="hdr-date" id="hdrDate"></span><span class="hdr-clock mono" id="hdrClock"></span></span></span>
    </div>
    <button class="user-chip" id="userChip" onclick="changeUser()">
      <span class="avatar" id="userAvatar">M</span>
      <span id="userName">Milan</span>
    </button>
  </header>

  <main>
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <div class="seg" id="viewSeg">
        <button class="on" data-view="moji">Moji</button>
        <button data-view="svi">Svi</button>
        <button data-view="kalendar">📅 7 dana</button>
        <button data-view="rocista">⚖️ Ročišta</button>
        <button data-view="osobe">Po osobi</button>
        <button data-view="odob">⏳ Odobrenje <span id="pendBadge" class="pend-badge" style="display:none">0</span></button>
      </div>
      <div class="spacer"></div>
      <select class="sort" id="sortSel" onchange="render()">
        <option value="rok">Po roku</option>
        <option value="tip">Po tipu</option>
        <option value="kreiran">Najnoviji</option>
      </select>
      <button class="btn btn-ghost" onclick="document.getElementById('xlsxInput').click()">📊 Uvezi Excel</button>
      <input type="file" id="xlsxInput" accept=".xlsx,.xls" style="display:none">
    </div>

    <div id="taskList"></div>
  </main>

  <button class="fab" onclick="openNew()">➕ Novi zadatak</button>
</div>

<!-- ============ MODAL ============ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-h">
      <b id="modalTitle">Novi zadatak</b>
      <button class="x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="seg" id="kindSeg" style="margin-bottom:14px">
        <button type="button" class="on" data-kind="rok" onclick="setKind('rok')">📄 Rok / zadatak</button>
        <button type="button" data-kind="rociste" onclick="setKind('rociste')">⚖️ Ročište</button>
      </div>
      <div class="field">
        <label>Broj predmeta <span class="hint">ukucaj ili izaberi iz uvezenih</span></label>
        <input id="fNum" list="predmetiList" placeholder="npr. Kž 3-3/26" autocomplete="off">
        <datalist id="predmetiList"></datalist>
      </div>
      <div class="field">
        <label id="typeLbl">Tip zadatka</label>
        <select id="fType" onchange="toggleOther()"></select>
      </div>
      <div class="field" id="otherWrap" style="display:none">
        <label>Opiši zadatak <span class="hint">pošto je "Ostalo"</span></label>
        <input id="fOther" placeholder="npr. Sastaviti opomenu pred utuženje">
      </div>
      <div class="field" id="courtWrap" style="display:none">
        <label>Sud <span class="hint">npr. Osnovni sud u Novom Sadu</span></label>
        <input id="fCourt" list="courtList" placeholder="npr. Viši sud u Beogradu" autocomplete="off">
        <datalist id="courtList"></datalist>
      </div>
      <div class="field" id="roomWrap" style="display:none">
        <label>Sala / soba <span class="hint">opciono</span></label>
        <input id="fRoom" placeholder="npr. Sala 3 / soba 215">
      </div>
      <div class="row2">
        <div class="field">
          <label>Dodeljen</label>
          <select id="fWho"></select>
        </div>
        <div class="field">
          <label><span id="dateLbl">Rok</span> <span class="hint">datum</span></label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="field">
        <label>Vreme <span class="hint">opciono — sat roka/sastanka</span></label>
        <input type="time" id="fTime">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="fStatus">
          <option value="otvoreno">Otvoreno</option>
          <option value="u-toku">U toku</option>
          <option value="gotovo">Gotovo</option>
        </select>
      </div>
      <div class="field">
        <label>Napomena <span class="hint">opciono</span></label>
        <textarea id="fNote" placeholder="Dodatne informacije..."></textarea>
      </div>
    </div>
    <div class="modal-foot" id="modalFoot">
      <button class="btn btn-danger" id="delBtn" onclick="delTask()" style="display:none">🗑️ Obriši</button>
      <button class="btn btn-ghost" onclick="closeModal()">Otkaži</button>
      <button class="btn btn-primary" onclick="saveTask()">Sačuvaj</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== PODACI =====================
const TEAM = [
  {id:'milan',  name:'Milan Mišić',       nick:'Scott', role:'advokat',      av:'MM'},
  {id:'aleksa', name:'Aleksa Banjac',     role:'advokat',      av:'AB'},
  {id:'dunja',  name:'Dunja Tepavčević',  role:'advokat',      av:'DT'},
  {id:'djordje',name:'Đorđe Nedeljkov',   role:'advokat',      av:'ĐN'},
  {id:'sofija', name:'Sofija',            role:'administracija',av:'S'},
];

const TYPES = [
  {v:'Tužba',                          c:'b-akt'},
  {v:'Odgovor na tužbu',               c:'b-odg'},
  {v:'Žalba',                          c:'b-akt'},
  {v:'Odgovor na žalbu',               c:'b-odg'},
  {v:'Predlog za izvršenje',           c:'b-izv'},
  {v:'Krivična prijava',               c:'b-kriv'},
  {v:'Podnesak',                       c:'b-admin'},
  {v:'Revizija',                       c:'b-akt'},
  {v:'Ustavna žalba',                  c:'b-akt'},
  {v:'Zahtev za zaštitu zakonitosti',  c:'b-akt'},
  {v:'Zvati za sastanak',              c:'b-poziv'},
  {v:'Zvati za plaćanje',              c:'b-poziv'},
  {v:'Katastar (podnesak)',            c:'b-admin'},
  {v:'Ostalo',                         c:'b-other'},
];
// Tipovi ročišta (kada je kind === 'rociste')
const TYPES_HEARING = [
  {v:'Glavna rasprava',     c:'b-rociste'},
  {v:'Pripremno ročište',   c:'b-rociste'},
  {v:'Ročište',             c:'b-rociste'},
  {v:'Pretres',             c:'b-rociste'},
  {v:'Saslušanje',          c:'b-rociste'},
  {v:'Uviđaj',              c:'b-rociste'},
  {v:'Ostalo',              c:'b-rociste'},
];
function typeClass(t){ const x=TYPES.find(y=>y.v===t)||TYPES_HEARING.find(y=>y.v===t); return x?x.c:'b-other'; }

// ===================== STORAGE =====================
const store={
  _mem:{},
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return this._mem[k]||null; } },
  set(k,val){ try{ localStorage.setItem(k,JSON.stringify(val)); }catch(e){ this._mem[k]=val; } }
};
const K_TASKS='km-zadaci-v1', K_PRED='km-predmeti-v1', K_USER='km-user-v1';

let tasks = store.get(K_TASKS) || seedTasks();
let predmeti = store.get(K_PRED) || ['Kž 3-3/26','P 412/2025','I 88/2024'];
let currentUser = store.get(K_USER) || null;
let editingId = null;
let currentView = 'moji';

function seedTasks(){
  const today=new Date(); const d=(n)=>{const x=new Date(today);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);};
  return [
    {id:uid(), num:'Kž 3-3/26', type:'Zahtev za zaštitu zakonitosti', who:'milan', date:d(2), time:'', status:'u-toku', note:'Hitno — dostaviti spis Vrhovnom sudu', approved:true, approvedBy:'milan', created:Date.now()},
    {id:uid(), num:'P 412/2025', type:'Odgovor na tužbu', who:'aleksa', date:d(6), time:'', status:'otvoreno', note:'', approved:true, approvedBy:'milan', created:Date.now()-1000},
    {id:uid(), num:'I 88/2024', type:'Predlog za izvršenje', who:'dunja', date:d(-1), time:'', status:'otvoreno', note:'Rok je prošao — proveriti', approved:true, approvedBy:'milan', created:Date.now()-2000},
    {id:uid(), num:'P 412/2025', type:'Zvati za plaćanje', who:'sofija', date:d(0), time:'10:00', status:'otvoreno', note:'Klijent kasni sa avansom', approved:true, approvedBy:'sofija', created:Date.now()-3000},
    {id:uid(), num:'Kž 1-303/25', type:'Žalba', who:'djordje', date:d(4), time:'', status:'otvoreno', note:'Uneo Đorđe — čeka odobrenje', approved:false, approvedBy:null, created:Date.now()-500},
    {id:uid(), num:'K 120/2025', type:'Glavna rasprava', kind:'rociste', court:'Osnovni sud u Novom Sadu', room:'Sala 3', who:'sofija', date:d(1), time:'09:30', status:'otvoreno', note:'Poneti spise i punomoćje', approved:true, approvedBy:'milan', created:Date.now()-400},
  ];
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function save(){ store.set(K_TASKS,tasks); store.set(K_PRED,predmeti); }

// ===================== INIT =====================
function init(){
  // login lista
  const pl=document.getElementById('peopleList');
  pl.innerHTML = TEAM.map(p=>`
    <button class="person-btn" onclick="login('${p.id}')">
      <span class="avatar">${p.av}</span>
      <span class="pi"><b>${p.name}${p.nick?` <span class="nick">(${p.nick})</span>`:''}</b><span>${p.role}</span></span>
    </button>`).join('');

  // type select
  document.getElementById('fType').innerHTML = TYPES.map(t=>`<option value="${t.v}">${t.v}</option>`).join('');
  // who select
  document.getElementById('fWho').innerHTML = TEAM.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  // predmeti datalist
  refreshPredmetiList();
  refreshCourtList();

  // view segmenti
  document.querySelectorAll('#viewSeg button').forEach(b=>{
    b.onclick=()=>{ document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); currentView=b.dataset.view; render(); };
  });

  // excel
  document.getElementById('xlsxInput').onchange = handleExcel;

  if(currentUser){ enterApp(); } 
}

function refreshPredmetiList(){
  document.getElementById('predmetiList').innerHTML = predmeti.map(p=>`<option value="${p}">`).join('');
}
function refreshCourtList(){
  const courts=[...new Set(tasks.filter(t=>t.court).map(t=>t.court))];
  const el=document.getElementById('courtList');
  if(el) el.innerHTML = courts.map(c=>`<option value="${esc(c)}">`).join('');
}

// ===================== LOGIN =====================
function login(id){ currentUser=id; store.set(K_USER,id); enterApp(); }
function changeUser(){ currentUser=null; store.set(K_USER,null);
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').style.display='grid'; }
function enterApp(){
  const u=TEAM.find(p=>p.id===currentUser);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('userAvatar').textContent=u.av;
  document.getElementById('userName').textContent=u.name.split(' ')[0]+(u.nick?` (${u.nick})`:'');
  currentView='moji';
  document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.toggle('on',x.dataset.view==='moji'));
  render();
}

// ===================== ROK LOGIKA =====================
function rokInfo(dateStr){
  if(!dateStr) return {cls:'', txt:'bez roka', days:9999};
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  const days=Math.round((d-today)/86400000);
  let cls,txt;
  if(days<0){ cls='over'; txt=`prošlo ${Math.abs(days)} d`; }
  else if(days===0){ cls='over'; txt='danas!'; }
  else if(days<=3){ cls='soon'; txt=`za ${days} d`; }
  else if(days<=7){ cls='soon'; txt=`za ${days} d`; }
  else { cls='ok'; txt=`za ${days} d`; }
  return {cls,txt,days};
}
function fmtDate(s){ if(!s)return''; const d=new Date(s);
  return d.toLocaleDateString('sr-RS',{day:'2-digit',month:'2-digit',year:'numeric'}); }

// ===================== ODOBRAVANJE =====================
// Milan: uvek. Sofija: pon-pet 08:00-14:59. Ostali: ne.
function canApprove(userId){
  if(userId==='milan') return true;
  if(userId==='sofija'){
    const now=new Date();
    const day=now.getDay();          // 0=ned, 1=pon ... 6=sub
    const hour=now.getHours();
    return day>=1 && day<=5 && hour>=8 && hour<15;
  }
  return false;
}
function sofijaWindowMsg(){
  return 'Odobravanje je za Sofiju dostupno radnim danom 08–15h';
}
function approveTask(id, ev){
  if(ev) ev.stopPropagation();
  const t=tasks.find(x=>x.id===id); if(!t) return;
  if(!canApprove(currentUser)){ showToast(sofijaWindowMsg(),true); return; }
  t.approved=true; t.approvedBy=currentUser;
  save(); render(); showToast('Zadatak odobren ✓');
}
function updatePendBadge(){
  const n=tasks.filter(t=>!t.approved).length;
  const b=document.getElementById('pendBadge');
  if(n>0){ b.textContent=n; b.style.display='inline-block'; }
  else b.style.display='none';
}

// ===================== KALENDAR (7 dana) =====================
let calOffset=0; // 0 = nedelja koja počinje danas
function calStart(){
  const s=new Date(); s.setHours(0,0,0,0); s.setDate(s.getDate()+calOffset*7); return s;
}
function calMove(dir){ calOffset+=dir; render(); }
function calToday(){ calOffset=0; render(); }

const DNI=['Nedelja','Ponedeljak','Utorak','Sreda','Četvrtak','Petak','Subota'];
function renderCalendar(){
  const list=document.getElementById('taskList');
  const start=calStart();
  const end=new Date(start); end.setDate(end.getDate()+6);
  const todayStr=new Date().toISOString().slice(0,10);

  let html=`<div class="cal-head">
    <div class="cal-range">${start.toLocaleDateString('sr-RS',{day:'2-digit',month:'short'})} – ${end.toLocaleDateString('sr-RS',{day:'2-digit',month:'short',year:'numeric'})}</div>
    <div class="cal-nav">
      <button onclick="calMove(-1)" title="Prethodna nedelja">‹</button>
      <button onclick="calToday()" title="Danas" style="width:auto;padding:0 12px;font-size:13px">Danas</button>
      <button onclick="calMove(1)" title="Sledeća nedelja">›</button>
    </div>
  </div><div class="cal-grid">`;

  for(let i=0;i<7;i++){
    const day=new Date(start); day.setDate(day.getDate()+i);
    const dayStr=day.toISOString().slice(0,10);
    const dow=day.getDay();
    const isToday=dayStr===todayStr;
    const isWeekend=dow===0||dow===6;
    // zadaci za taj dan (po roku)
    const dayTasks=tasks.filter(t=>t.date===dayStr)
      .sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
    html+=`<div class="cal-day ${isToday?'today':''} ${isWeekend?'weekend':''}">
      <div class="cal-day-h ${isToday?'today-h':''}">
        <span class="dname">${DNI[dow]}<small>${day.getDate()}.${day.getMonth()+1}.</small></span>
        <span class="dcount">${dayTasks.length||''}</span>
      </div>
      <div class="cal-items">`;
    if(dayTasks.length===0){
      html+=`<div class="cal-empty">—</div>`;
    } else {
      html+=dayTasks.map(t=>{
        const who=TEAM.find(p=>p.id===t.who)||{name:'?'};
        const r=rokInfo(t.date);
        const dot = !t.approved ? 'ci-pend' : (t.kind==='rociste' ? 'ci-rociste' : (t.status==='gotovo'?'ci-ok':r.cls==='over'?'ci-over':r.cls==='soon'?'ci-soon':'ci-ok'));
        return `<div class="cal-item" onclick="openEdit('${t.id}')">
          <span class="ci-dot ${dot}"></span>
          <div class="ci-body">
            <div class="ci-type">${t.kind==='rociste'?'⚖️ ':''}${esc(shortType(t.type))}</div>
            <div class="ci-sub">${t.time?'🕑 '+t.time+' · ':''}${who.name.split(' ')[0]}${t.num?' · <span class="ci-num">'+esc(t.num)+'</span>':''}${!t.approved?' · ⏳':''}</div>
          </div>
        </div>`;
      }).join('');
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  list.innerHTML=html;
}

// ===================== RENDER =====================
function render(){
  updatePendBadge();
  // kalendar je poseban prikaz
  if(currentView==='kalendar'){ renderStats(); renderCalendar(); return; }

  renderStats();
  const list=document.getElementById('taskList');
  let arr=[...tasks];

  if(currentView==='moji') arr=arr.filter(t=>t.who===currentUser);
  else if(currentView==='odob') arr=arr.filter(t=>!t.approved);
  else if(currentView==='rocista') arr=arr.filter(t=>t.kind==='rociste');

  const sort=document.getElementById('sortSel').value;
  if(sort==='rok') arr.sort((a,b)=>(rokInfo(a.date).days)-(rokInfo(b.date).days));
  else if(sort==='tip') arr.sort((a,b)=>a.type.localeCompare(b.type,'sr'));
  else arr.sort((a,b)=>b.created-a.created);

  if(arr.length===0){
    const msg = currentView==='odob' ? 'Nema zadataka na čekanju — sve je odobreno ✓'
      : currentView==='moji' ? 'Nemaš dodeljenih zadataka.'
      : currentView==='rocista' ? 'Još nema ročišta. Dodaj ročište dugmetom dole.'
      : 'Dodaj prvi zadatak dugmetom dole.';
    const emptyTitle = currentView==='rocista' ? 'Nema ročišta' : 'Nema zadataka';
    list.innerHTML=`<div class="empty"><div class="big">${currentView==='odob'?'✅':currentView==='rocista'?'⚖️':'📋'}</div><b>${emptyTitle}</b>${msg}</div>`;
    return;
  }

  if(currentView==='osobe'){
    let html='';
    TEAM.forEach(p=>{
      const pt=arr.filter(t=>t.who===p.id);
      if(pt.length===0) return;
      html+=`<div class="group-h">${p.name} <span class="count">${pt.length}</span></div>`;
      html+=pt.map(taskCard).join('');
    });
    list.innerHTML=html;
  } else {
    list.innerHTML=arr.map(taskCard).join('');
  }
}

function renderStats(){
  const mine = currentView==='moji' ? tasks.filter(t=>t.who===currentUser) : tasks;
  const active=mine.filter(t=>t.status!=='gotovo');
  let danas=0,hitno=0,ned=0;
  active.forEach(t=>{ const r=rokInfo(t.date); if(r.days<0)hitno++; else if(r.days===0)danas++; else if(r.days<=7)ned++; });
  document.getElementById('stats').innerHTML=`
    <div class="stat today"><div class="n">${danas}</div><div class="l">Danas</div></div>
    <div class="stat urgent"><div class="n">${hitno}</div><div class="l">HITNO / isteklo</div></div>
    <div class="stat week"><div class="n">${ned}</div><div class="l">Ove nedelje</div></div>
    <div class="stat total"><div class="n">${active.length}</div><div class="l">Ukupno aktivnih</div></div>`;
}

function taskCard(t){
  const r=rokInfo(t.date);
  const who=TEAM.find(p=>p.id===t.who)||{name:'?',av:'?'};
  const pendingCls = !t.approved ? 't-pending' : '';
  const dueClass = t.status==='gotovo' ? 'done' : (r.cls==='over'?'due-over':r.cls==='soon'?'due-soon':r.cls==='ok'?'due-ok':'');
  const stClass={'otvoreno':'st-otvoreno','u-toku':'st-utoku','gotovo':'st-gotovo'}[t.status];
  const stTxt={'otvoreno':'Otvoreno','u-toku':'U toku','gotovo':'Gotovo'}[t.status];
  const timeStr = t.time ? ' u '+t.time : '';

  // approval traka
  let approveHtml='';
  if(!t.approved){
    if(canApprove(currentUser)){
      approveHtml=`<div class="approve-bar">
        <button class="btn-approve" onclick="approveTask('${t.id}',event)">✓ Odobri zadatak</button>
      </div>`;
    } else {
      approveHtml=`<div class="approve-note">⏳ Čeka odobrenje (Milan ili Sofija)</div>`;
    }
  }

  if(t.kind==='rociste'){
    const hp=[];
    if(t.court) hp.push('🏛️ '+esc(t.court));
    if(t.room)  hp.push('🚪 '+esc(t.room));
    if(t.time)  hp.push('🕑 '+esc(t.time));
    const hear=hp.join('');
    return `<div class="task kind-rociste ${dueClass} ${pendingCls}" onclick="openEdit('${t.id}')">
      <div class="t-top">
        <div>
          <div class="t-title">⚖️ ${esc(t.type)}</div>
          <div class="t-num mono">${esc(t.num||'—')}</div>
        </div>
        ${!t.approved?'<span class="pend-tag">⏳ Čeka</span>':'<span class="t-badge b-rociste">Ročište</span>'}
      </div>
      <div class="t-meta">
        <span class="t-rok ${r.cls}">🗓️ ${r.txt}${t.date?' · '+fmtDate(t.date)+timeStr:''}</span>
        <span class="t-who"><span class="avatar">${who.av}</span>${who.name.split(' ')[0]}</span>
        <span class="t-status ${stClass}">${stTxt}</span>
      </div>
      ${hear?`<div class="t-hear">${hp.map(x=>`<span>${x}</span>`).join('')}</div>`:''}
      ${t.note?`<div class="t-note">${esc(t.note)}</div>`:''}
      ${approveHtml}
    </div>`;
  }
  return `<div class="task ${dueClass} ${pendingCls}" onclick="openEdit('${t.id}')">
    <div class="t-top">
      <div>
        <div class="t-title">${esc(t.type)}</div>
        <div class="t-num mono">${esc(t.num||'—')}</div>
      </div>
      ${!t.approved?'<span class="pend-tag">⏳ Čeka</span>':`<span class="t-badge ${typeClass(t.type)}">${esc(shortType(t.type))}</span>`}
    </div>
    <div class="t-meta">
      <span class="t-rok ${r.cls}">🕑 ${r.txt}${t.date?' · '+fmtDate(t.date)+timeStr:''}</span>
      <span class="t-who"><span class="avatar">${who.av}</span>${who.name.split(' ')[0]}</span>
      <span class="t-status ${stClass}">${stTxt}</span>
    </div>
    ${t.note?`<div class="t-note">${esc(t.note)}</div>`:''}
    ${approveHtml}
  </div>`;
}
function shortType(t){ return t.length>22?t.slice(0,20)+'…':t; }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ===================== MODAL =====================
function openNew(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Novi zadatak';
  document.getElementById('fNum').value='';
  document.getElementById('fOther').value='';
  document.getElementById('fCourt').value='';
  document.getElementById('fRoom').value='';
  document.getElementById('fWho').value=currentUser;
  document.getElementById('fDate').value='';
  document.getElementById('fTime').value='';
  document.getElementById('fStatus').value='otvoreno';
  document.getElementById('fNote').value='';
  document.getElementById('delBtn').style.display='none';
  // ako se otvara iz taba Ročišta, podrazumevaj ročište
  setKind(currentView==='rocista' ? 'rociste' : 'rok');
  document.getElementById('overlay').classList.add('open');
}
function openEdit(id){
  const t=tasks.find(x=>x.id===id); if(!t)return;
  editingId=id;
  document.getElementById('modalTitle').textContent=t.kind==='rociste'?'Izmeni ročište':'Izmeni zadatak';
  // postavi vrstu (rok/ročište) i odgovarajuću listu tipova
  setKind(t.kind==='rociste'?'rociste':'rok');
  // ako je tip custom (Ostalo), prikaži ga
  const list=t.kind==='rociste'?TYPES_HEARING:TYPES;
  const known=list.find(y=>y.v===t.type);
  if(known){ document.getElementById('fType').value=t.type; document.getElementById('fOther').value=''; }
  else { document.getElementById('fType').value='Ostalo'; document.getElementById('fOther').value=t.type; }
  document.getElementById('fNum').value=t.num||'';
  document.getElementById('fCourt').value=t.court||'';
  document.getElementById('fRoom').value=t.room||'';
  document.getElementById('fWho').value=t.who;
  document.getElementById('fDate').value=t.date||'';
  document.getElementById('fTime').value=t.time||'';
  document.getElementById('fStatus').value=t.status;
  document.getElementById('fNote').value=t.note||'';
  document.getElementById('delBtn').style.display='inline-flex';
  toggleOther();
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function toggleOther(){
  const isOther=document.getElementById('fType').value==='Ostalo';
  document.getElementById('otherWrap').style.display=isOther?'block':'none';
}
let formKind='rok';
function setKind(k){
  formKind=k;
  document.querySelectorAll('#kindSeg button').forEach(b=>b.classList.toggle('on', b.dataset.kind===k));
  toggleKind();
}
function toggleKind(){
  const isR = formKind==='rociste';
  const sel=document.getElementById('fType');
  const cur=sel.value;
  const list=isR?TYPES_HEARING:TYPES;
  sel.innerHTML=list.map(t=>`<option value="${esc(t.v)}">${esc(t.v)}</option>`).join('');
  sel.value = list.find(x=>x.v===cur) ? cur : list[0].v;
  document.getElementById('courtWrap').style.display=isR?'block':'none';
  document.getElementById('roomWrap').style.display=isR?'block':'none';
  if(isR) refreshCourtList();
  document.getElementById('typeLbl').textContent=isR?'Vrsta ročišta':'Tip zadatka';
  document.getElementById('dateLbl').textContent=isR?'Datum ročišta':'Rok';
  toggleOther();
}
function saveTask(){
  const typeSel=document.getElementById('fType').value;
  const other=document.getElementById('fOther').value.trim();
  const finalType = typeSel==='Ostalo' ? (other||'Ostalo') : typeSel;
  const num=document.getElementById('fNum').value.trim();
  const isR = formKind==='rociste';
  const court = isR ? document.getElementById('fCourt').value.trim() : '';
  const room  = isR ? document.getElementById('fRoom').value.trim() : '';
  const obj={
    num, type:finalType, kind:formKind, court, room,
    who:document.getElementById('fWho').value,
    date:document.getElementById('fDate').value,
    time:document.getElementById('fTime').value,
    status:document.getElementById('fStatus').value,
    note:document.getElementById('fNote').value.trim(),
  };
  if(editingId){
    const t=tasks.find(x=>x.id===editingId);
    Object.assign(t,obj);
  } else {
    obj.id=uid(); obj.created=Date.now();
    // auto-odobravanje ako onaj ko unosi ima pravo (Milan uvek, Sofija u radno vreme)
    if(canApprove(currentUser)){ obj.approved=true; obj.approvedBy=currentUser; }
    else { obj.approved=false; obj.approvedBy=null; }
    tasks.unshift(obj);
  }
  // dodaj broj u predmete ako je nov
  if(num && !predmeti.includes(num)){ predmeti.push(num); refreshPredmetiList(); }
  save(); closeModal(); render();
  const imenica = isR ? 'Ročište' : 'Zadatak';
  let msg = editingId ? imenica+' izmenjen'+(isR?'o':'')+' ✓' : (obj.approved ? imenica+' dodat'+(isR?'o i odobreno':' i odobren')+' ✓' : imenica+' dodat'+(isR?'o':'')+' — čeka odobrenje ⏳');
  showToast(msg);
}
function delTask(){
  if(!editingId)return;
  if(!confirm('Obrisati ovaj zadatak?'))return;
  tasks=tasks.filter(x=>x.id!==editingId);
  save(); closeModal(); render();
  showToast('Zadatak obrisan');
}

// ===================== EXCEL IMPORT =====================
function handleExcel(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // pokušaj naći kolonu sa brojem predmeta
      let found=[];
      // ako prvi red izgleda kao header, traži kolonu "broj"
      let startRow=0, col=0;
      if(rows.length){
        const hdr=rows[0].map(x=>String(x).toLowerCase());
        const idx=hdr.findIndex(h=>h.includes('broj')||h.includes('predmet')||h.includes('spis'));
        if(idx>=0){ col=idx; startRow=1; }
      }
      for(let i=startRow;i<rows.length;i++){
        const val=String(rows[i][col]||'').trim();
        if(val) found.push(val);
      }
      found=[...new Set(found)];
      if(found.length===0){ showToast('Excel pročitan, ali nije nađen nijedan broj predmeta.',true); return; }
      // spoji sa postojećim
      const before=predmeti.length;
      found.forEach(f=>{ if(!predmeti.includes(f)) predmeti.push(f); });
      refreshPredmetiList(); save();
      showToast(`Uvezeno ${found.length} predmeta (${predmeti.length-before} novih) ✓`);
    }catch(err){
      showToast('Greška pri čitanju Excel-a: '+err.message,true);
    }
    e.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' err':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3200);
}

// ===================== ŽIVI DATUM + SAT =====================
function tickClock(){
  const now=new Date();
  const dani=['Nedelja','Ponedeljak','Utorak','Sreda','Četvrtak','Petak','Subota'];
  const p=n=>String(n).padStart(2,'0');
  const de=document.getElementById('hdrDate');
  const ce=document.getElementById('hdrClock');
  if(de) de.textContent=`${dani[now.getDay()]}, ${p(now.getDate())}.${p(now.getMonth()+1)}.${now.getFullYear()}.`;
  if(ce) ce.textContent=`${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}
tickClock(); setInterval(tickClock,1000);

// close modal on overlay click
document.getElementById('overlay').onclick=(e)=>{ if(e.target.id==='overlay') closeModal(); };

// PWA service worker (za instalaciju ikone na telefon)
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}

init();
