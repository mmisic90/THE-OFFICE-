<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>The Office — Kancelarija Mišić</title>
<meta name="theme-color" content="#1b5e20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Office">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    /* The Office — zelena dominantna */
    --indigo:#1b5e20; --indigo-600:#14521b; --indigo-50:#e8f5e9;
    --red:#c62828; --red-50:#fdecea;
    --orange:#ef6c00; --orange-50:#fff4e5;
    --green:#43a047; --green-50:#edf7ed;
    --bg:#f3f6f3; --card:#ffffff; --ink:#15201a; --muted:#5a6b5f;
    --line:#dde7df; --shadow:0 1px 3px rgba(20,40,25,.08),0 1px 2px rgba(20,40,25,.05);
    --shadow-lg:0 10px 30px rgba(20,40,25,.16); --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    font-size:15px; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}

  /* ===== HEADER ===== */
  header{
    position:sticky; top:0; z-index:50; background:var(--indigo);
    color:#fff; padding:12px 16px; display:flex; align-items:center;
    justify-content:space-between; gap:10px; box-shadow:var(--shadow);
  }
  .brand{display:flex; align-items:center; gap:10px; min-width:0}
  .brand-txt{display:flex; flex-direction:column; min-width:0}
  .brand-txt b{font-size:16px; font-weight:800; letter-spacing:-.02em; white-space:nowrap}
  .brand-txt span{font-size:11px; opacity:.8}
  .nick{color:var(--green); font-weight:700; font-size:.85em}
  .tagline{font-size:15px; font-style:italic; color:var(--indigo); font-weight:600; margin:2px 0 8px}
  .user-chip{
    display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.14);
    padding:6px 10px; border-radius:999px; cursor:pointer; border:none;
    color:#fff; font-size:13px; font-weight:600; white-space:nowrap;
  }
  .user-chip:hover{background:rgba(255,255,255,.22)}
  .avatar{
    width:24px; height:24px; border-radius:50%; background:#fff; color:var(--indigo);
    display:grid; place-items:center; font-size:11px; font-weight:700; flex-shrink:0;
  }

  /* ===== LOGIN SCREEN ===== */
  .login{
    min-height:100vh; display:grid; place-items:center; padding:24px;
    background:linear-gradient(160deg,#1a237e 0%,#283593 55%,#3949ab 100%);
  }
  .login-card{
    background:#fff; border-radius:20px; padding:32px 24px; max-width:420px; width:100%;
    box-shadow:var(--shadow-lg); text-align:center;
  }
  .login-card h1{font-size:22px; color:var(--indigo); letter-spacing:-.02em; margin-bottom:4px}
  .login-card .sub{color:var(--muted); font-size:13px; margin-bottom:24px}
  .who{font-size:13px; font-weight:600; color:var(--muted); text-align:left; margin-bottom:10px}
  .people{display:flex; flex-direction:column; gap:8px}
  .person-btn{
    display:flex; align-items:center; gap:12px; padding:12px 14px; border:1.5px solid var(--line);
    border-radius:12px; background:#fff; cursor:pointer; text-align:left; transition:.15s; width:100%;
  }
  .person-btn:hover{border-color:var(--indigo); background:var(--indigo-50)}
  .person-btn .avatar{width:36px; height:36px; font-size:14px; background:var(--indigo); color:#fff}
  .person-btn .pi b{display:block; font-size:15px; color:var(--ink)}
  .person-btn .pi span{font-size:12px; color:var(--muted)}

  /* ===== APP LAYOUT ===== */
  .app{display:none}
  .app.active{display:block}
  main{max-width:980px; margin:0 auto; padding:16px; padding-bottom:96px}

  /* toolbar */
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px}
  .seg{display:flex; background:#fff; border:1px solid var(--line); border-radius:10px; padding:3px; gap:2px; overflow:hidden}
  .seg button{
    border:none; background:none; padding:7px 12px; border-radius:7px; font-size:13px;
    font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap;
  }
  .seg button.on{background:var(--indigo); color:#fff}
  .spacer{flex:1}
  .btn{
    border:none; border-radius:10px; padding:9px 14px; font-size:13px; font-weight:600;
    cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.15s;
  }
  .btn-ghost{background:#fff; border:1px solid var(--line); color:var(--ink)}
  .btn-ghost:hover{border-color:var(--indigo); color:var(--indigo)}
  .btn-primary{background:var(--indigo); color:#fff}
  .btn-primary:hover{background:var(--indigo-600)}

  select.sort{
    border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 10px;
    font-size:13px; font-weight:600; color:var(--ink); cursor:pointer;
  }

  /* stats row */
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px}
  .stat{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px}
  .stat .n{font-size:22px; font-weight:800; letter-spacing:-.02em; line-height:1}
  .stat .l{font-size:11px; color:var(--muted); margin-top:4px; font-weight:600}
  .stat.urgent .n{color:var(--red)}
  .stat.soon .n{color:var(--orange)}
  .stat.ok .n{color:var(--green)}
  .stat.total .n{color:var(--indigo)}

  /* group header */
  .group-h{font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase;
    letter-spacing:.05em; margin:18px 4px 8px; display:flex; align-items:center; gap:8px}
  .group-h .count{background:var(--line); color:var(--muted); border-radius:999px; padding:1px 8px; font-size:11px}

  /* task card */
  .task{
    background:var(--card); border:1px solid var(--line); border-left:4px solid var(--line);
    border-radius:var(--radius); padding:14px; margin-bottom:10px; cursor:pointer;
    transition:.15s; box-shadow:var(--shadow);
  }
  .task:hover{transform:translateY(-1px); box-shadow:var(--shadow-lg)}
  .task.due-over{border-left-color:var(--red)}
  .task.due-soon{border-left-color:var(--orange)}
  .task.due-ok{border-left-color:var(--green)}
  .task.done{opacity:.6}
  .task.done .t-title{text-decoration:line-through}

  .t-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px}
  .t-title{font-size:15px; font-weight:700; letter-spacing:-.01em}
  .t-num{font-size:12px; font-weight:700; color:var(--indigo); background:var(--indigo-50);
    padding:2px 8px; border-radius:6px; display:inline-block; margin-top:3px}
  .t-badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap; flex-shrink:0}
  .b-akt{background:var(--indigo-50); color:var(--indigo)}
  .b-odg{background:#e3f2fd; color:#1565c0}
  .b-izv{background:#f3e5f5; color:#7b1fa2}
  .b-kriv{background:#fce4ec; color:#c2185b}
  .b-poziv{background:var(--orange-50); color:var(--orange)}
  .b-admin{background:#eceff1; color:#546e7a}
  .b-other{background:#f5f5f5; color:#616161}

  .t-meta{display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-size:12px; color:var(--muted)}
  .t-rok{display:inline-flex; align-items:center; gap:5px; font-weight:700}
  .t-rok.over{color:var(--red)} .t-rok.soon{color:var(--orange)} .t-rok.ok{color:var(--green)}
  .t-who{display:inline-flex; align-items:center; gap:5px}
  .t-who .avatar{width:18px; height:18px; font-size:9px; background:var(--indigo); color:#fff}
  .t-note{margin-top:8px; font-size:13px; color:var(--muted); background:#fafbff;
    border-radius:8px; padding:8px 10px; border:1px solid var(--line)}
  .t-status{font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px}
  .st-otvoreno{background:var(--indigo-50); color:var(--indigo)}
  .st-utoku{background:var(--orange-50); color:var(--orange)}
  .st-gotovo{background:var(--green-50); color:var(--green)}

  .empty{text-align:center; padding:60px 20px; color:var(--muted)}
  .empty .big{font-size:40px; margin-bottom:12px}
  .empty b{display:block; color:var(--ink); margin-bottom:4px; font-size:16px}

  /* FAB */
  .fab{
    position:fixed; right:18px; bottom:18px; z-index:40;
    background:var(--indigo); color:#fff; border:none; border-radius:999px;
    padding:14px 20px; font-size:15px; font-weight:700; cursor:pointer;
    box-shadow:0 6px 20px rgba(26,35,126,.4); display:inline-flex; align-items:center; gap:8px;
  }
  .fab:hover{background:var(--indigo-600)}

  /* MODAL */
  .overlay{
    position:fixed; inset:0; background:rgba(16,18,46,.5); z-index:100;
    display:none; align-items:flex-end; justify-content:center; padding:0;
  }
  .overlay.open{display:flex}
  .modal{
    background:#fff; border-radius:20px 20px 0 0; width:100%; max-width:560px;
    max-height:92vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .modal-h{position:sticky; top:0; background:#fff; padding:18px 20px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; z-index:2}
  .modal-h b{font-size:17px; letter-spacing:-.02em}
  .x{border:none; background:#f0f1f6; width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:16px; color:var(--muted)}
  .modal-body{padding:18px 20px 24px}
  .field{margin-bottom:16px}
  .field label{display:block; font-size:13px; font-weight:700; margin-bottom:6px; color:var(--ink)}
  .field .hint{font-size:11px; color:var(--muted); font-weight:500; margin-left:6px}
  .field input,.field select,.field textarea{
    width:100%; border:1.5px solid var(--line); border-radius:10px; padding:11px 12px;
    font-size:15px; font-family:inherit; color:var(--ink); background:#fff; transition:.15s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none; border-color:var(--indigo); box-shadow:0 0 0 3px var(--indigo-50);
  }
  .field textarea{resize:vertical; min-height:64px}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .modal-foot{display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--line);
    position:sticky; bottom:0; background:#fff}
  .modal-foot .btn{flex:1; justify-content:center; padding:12px}
  .btn-danger{background:var(--red-50); color:var(--red); border:none}
  .btn-danger:hover{background:#f9d6d3}

  /* import toast */
  .toast{position:fixed; top:70px; left:50%; transform:translateX(-50%); z-index:200;
    background:var(--green); color:#fff; padding:12px 20px; border-radius:12px; font-size:14px;
    font-weight:600; box-shadow:var(--shadow-lg); display:none; max-width:90%}
  .toast.show{display:block; animation:slideUp .25s}
  .toast.err{background:var(--red)}

  /* pending badge na segmentu */
  .pend-badge{background:var(--red); color:#fff; border-radius:999px; padding:0 6px; font-size:10px; margin-left:4px; font-weight:800}

  /* approval na kartici */
  .t-pending{border-left-color:#9c27b0!important; background:linear-gradient(0deg,#fbf5fe,#fff)}
  .pend-tag{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
    color:#7b1fa2; background:#f3e5f5; padding:3px 9px; border-radius:999px}
  .approve-bar{display:flex; gap:8px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
  .btn-approve{flex:1; background:var(--green); color:#fff; border:none; border-radius:9px; padding:9px;
    font-size:13px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:6px}
  .btn-approve:hover{background:#256628}
  .btn-approve:disabled{background:#cfd4dd; color:#8a909c; cursor:not-allowed}
  .approve-note{font-size:11px; color:var(--muted); text-align:center; padding:6px; font-style:italic}

  /* KALENDAR */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px}
  .cal-nav{display:flex; gap:6px; align-items:center}
  .cal-nav button{border:1px solid var(--line); background:#fff; width:34px; height:34px; border-radius:9px;
    cursor:pointer; font-size:16px; color:var(--indigo); font-weight:700}
  .cal-nav button:hover{background:var(--indigo-50)}
  .cal-range{font-size:14px; font-weight:700; color:var(--ink)}
  .cal-grid{display:grid; grid-template-columns:1fr; gap:8px}
  .cal-day{background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden}
  .cal-day.today{border-color:var(--indigo); box-shadow:0 0 0 2px var(--indigo-50)}
  .cal-day.weekend .cal-day-h{background:#fafbff}
  .cal-day-h{display:flex; align-items:center; justify-content:space-between; padding:9px 12px;
    background:#f7f8fc; border-bottom:1px solid var(--line)}
  .cal-day-h .dname{font-size:13px; font-weight:700}
  .cal-day-h .dname small{font-weight:500; color:var(--muted); margin-left:6px}
  .cal-day-h.today-h .dname{color:var(--indigo)}
  .cal-day-h .dcount{font-size:11px; color:var(--muted); font-weight:600}
  .cal-items{padding:8px}
  .cal-empty{padding:10px 12px; font-size:12px; color:#b0b6c3; font-style:italic}
  .cal-item{display:flex; align-items:center; gap:8px; padding:8px; border-radius:8px; cursor:pointer; transition:.12s}
  .cal-item:hover{background:var(--indigo-50)}
  .cal-item .ci-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0}
  .ci-over{background:var(--red)} .ci-soon{background:var(--orange)} .ci-ok{background:var(--green)} .ci-pend{background:#9c27b0}
  .cal-item .ci-body{flex:1; min-width:0}
  .cal-item .ci-type{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cal-item .ci-sub{font-size:11px; color:var(--muted)}
  .cal-item .ci-num{font-size:11px; font-weight:700; color:var(--indigo)}
  @media(min-width:760px){
    .cal-grid{grid-template-columns:repeat(7,1fr); gap:6px}
    .cal-day-h{flex-direction:column; align-items:flex-start; gap:2px; min-height:48px}
    .cal-item{flex-direction:column; align-items:flex-start; gap:4px; padding:6px}
    .cal-item .ci-type{font-size:11px; white-space:normal}
  }

  /* desktop tweaks */
  @media(min-width:720px){
    .overlay{align-items:center; padding:24px}
    .modal{border-radius:20px}
    .fab{padding:14px 22px}
  }
  @media(max-width:480px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .brand b{font-size:15px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login" id="loginScreen">
  <div class="login-card">
    <h1>The Office</h1>
    <div class="tagline">nismo povezani ??</div>
    <div class="sub">Kancelarija Mišić · zadaci i rokovi</div>
    <div class="who">Ko si ti?</div>
    <div class="people" id="peopleList"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="appScreen">
  <header>
    <div class="brand">
      <span class="brand-txt"><b>The Office</b><span>Kancelarija Mišić</span></span>
    </div>
    <button class="user-chip" id="userChip" onclick="changeUser()">
      <span class="avatar" id="userAvatar">M</span>
      <span id="userName">Milan</span>
    </button>
  </header>

  <main>
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <div class="seg" id="viewSeg">
        <button class="on" data-view="moji">Moji</button>
        <button data-view="svi">Svi</button>
        <button data-view="kalendar">📅 7 dana</button>
        <button data-view="osobe">Po osobi</button>
        <button data-view="odob">⏳ Odobrenje <span id="pendBadge" class="pend-badge" style="display:none">0</span></button>
      </div>
      <div class="spacer"></div>
      <select class="sort" id="sortSel" onchange="render()">
        <option value="rok">Po roku</option>
        <option value="tip">Po tipu</option>
        <option value="kreiran">Najnoviji</option>
      </select>
      <button class="btn btn-ghost" onclick="document.getElementById('xlsxInput').click()">📊 Uvezi Excel</button>
      <input type="file" id="xlsxInput" accept=".xlsx,.xls" style="display:none">
    </div>

    <div id="taskList"></div>
  </main>

  <button class="fab" onclick="openNew()">➕ Novi zadatak</button>
</div>

<!-- ============ MODAL ============ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-h">
      <b id="modalTitle">Novi zadatak</b>
      <button class="x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Broj predmeta <span class="hint">ukucaj ili izaberi iz uvezenih</span></label>
        <input id="fNum" list="predmetiList" placeholder="npr. Kž 3-3/26" autocomplete="off">
        <datalist id="predmetiList"></datalist>
      </div>
      <div class="field">
        <label>Tip zadatka</label>
        <select id="fType" onchange="toggleOther()"></select>
      </div>
      <div class="field" id="otherWrap" style="display:none">
        <label>Opiši zadatak <span class="hint">pošto je "Ostalo"</span></label>
        <input id="fOther" placeholder="npr. Sastaviti opomenu pred utuženje">
      </div>
      <div class="row2">
        <div class="field">
          <label>Dodeljen</label>
          <select id="fWho"></select>
        </div>
        <div class="field">
          <label>Rok <span class="hint">datum</span></label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="field">
        <label>Vreme <span class="hint">opciono — sat roka/sastanka</span></label>
        <input type="time" id="fTime">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="fStatus">
          <option value="otvoreno">Otvoreno</option>
          <option value="u-toku">U toku</option>
          <option value="gotovo">Gotovo</option>
        </select>
      </div>
      <div class="field">
        <label>Napomena <span class="hint">opciono</span></label>
        <textarea id="fNote" placeholder="Dodatne informacije..."></textarea>
      </div>
    </div>
    <div class="modal-foot" id="modalFoot">
      <button class="btn btn-danger" id="delBtn" onclick="delTask()" style="display:none">🗑️ Obriši</button>
      <button class="btn btn-ghost" onclick="closeModal()">Otkaži</button>
      <button class="btn btn-primary" onclick="saveTask()">Sačuvaj</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== PODACI =====================
const TEAM = [
  {id:'milan',  name:'Milan Mišić',       nick:'Scott', role:'advokat',      av:'MM'},
  {id:'aleksa', name:'Aleksa Banjac',     role:'advokat',      av:'AB'},
  {id:'dunja',  name:'Dunja Tepavčević',  role:'advokat',      av:'DT'},
  {id:'djordje',name:'Đorđe Nedeljkov',   role:'advokat',      av:'ĐN'},
  {id:'sofija', name:'Sofija',            role:'administracija',av:'S'},
];

const TYPES = [
  {v:'Tužba',                          c:'b-akt'},
  {v:'Odgovor na tužbu',               c:'b-odg'},
  {v:'Žalba',                          c:'b-akt'},
  {v:'Odgovor na žalbu',               c:'b-odg'},
  {v:'Predlog za izvršenje',           c:'b-izv'},
  {v:'Krivična prijava',               c:'b-kriv'},
  {v:'Podnesak',                       c:'b-admin'},
  {v:'Revizija',                       c:'b-akt'},
  {v:'Ustavna žalba',                  c:'b-akt'},
  {v:'Zahtev za zaštitu zakonitosti',  c:'b-akt'},
  {v:'Zvati za sastanak',              c:'b-poziv'},
  {v:'Zvati za plaćanje',              c:'b-poziv'},
  {v:'Katastar (podnesak)',            c:'b-admin'},
  {v:'Ostalo',                         c:'b-other'},
];
function typeClass(t){ const x=TYPES.find(y=>y.v===t); return x?x.c:'b-other'; }

// ===================== STORAGE =====================
const store={
  _mem:{},
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return this._mem[k]||null; } },
  set(k,val){ try{ localStorage.setItem(k,JSON.stringify(val)); }catch(e){ this._mem[k]=val; } }
};
const K_TASKS='km-zadaci-v1', K_PRED='km-predmeti-v1', K_USER='km-user-v1';

let tasks = store.get(K_TASKS) || seedTasks();
let predmeti = store.get(K_PRED) || ['Kž 3-3/26','P 412/2025','I 88/2024'];
let currentUser = store.get(K_USER) || null;
let editingId = null;
let currentView = 'moji';

function seedTasks(){
  const today=new Date(); const d=(n)=>{const x=new Date(today);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);};
  return [
    {id:uid(), num:'Kž 3-3/26', type:'Zahtev za zaštitu zakonitosti', who:'milan', date:d(2), time:'', status:'u-toku', note:'Hitno — dostaviti spis Vrhovnom sudu', approved:true, approvedBy:'milan', created:Date.now()},
    {id:uid(), num:'P 412/2025', type:'Odgovor na tužbu', who:'aleksa', date:d(6), time:'', status:'otvoreno', note:'', approved:true, approvedBy:'milan', created:Date.now()-1000},
    {id:uid(), num:'I 88/2024', type:'Predlog za izvršenje', who:'dunja', date:d(-1), time:'', status:'otvoreno', note:'Rok je prošao — proveriti', approved:true, approvedBy:'milan', created:Date.now()-2000},
    {id:uid(), num:'P 412/2025', type:'Zvati za plaćanje', who:'sofija', date:d(0), time:'10:00', status:'otvoreno', note:'Klijent kasni sa avansom', approved:true, approvedBy:'sofija', created:Date.now()-3000},
    {id:uid(), num:'Kž 1-303/25', type:'Žalba', who:'djordje', date:d(4), time:'', status:'otvoreno', note:'Uneo Đorđe — čeka odobrenje', approved:false, approvedBy:null, created:Date.now()-500},
  ];
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function save(){ store.set(K_TASKS,tasks); store.set(K_PRED,predmeti); }

// ===================== INIT =====================
function init(){
  // login lista
  const pl=document.getElementById('peopleList');
  pl.innerHTML = TEAM.map(p=>`
    <button class="person-btn" onclick="login('${p.id}')">
      <span class="avatar">${p.av}</span>
      <span class="pi"><b>${p.name}${p.nick?` <span class="nick">(${p.nick})</span>`:''}</b><span>${p.role}</span></span>
    </button>`).join('');

  // type select
  document.getElementById('fType').innerHTML = TYPES.map(t=>`<option value="${t.v}">${t.v}</option>`).join('');
  // who select
  document.getElementById('fWho').innerHTML = TEAM.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  // predmeti datalist
  refreshPredmetiList();

  // view segmenti
  document.querySelectorAll('#viewSeg button').forEach(b=>{
    b.onclick=()=>{ document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); currentView=b.dataset.view; render(); };
  });

  // excel
  document.getElementById('xlsxInput').onchange = handleExcel;

  if(currentUser){ enterApp(); } 
}

function refreshPredmetiList(){
  document.getElementById('predmetiList').innerHTML = predmeti.map(p=>`<option value="${p}">`).join('');
}

// ===================== LOGIN =====================
function login(id){ currentUser=id; store.set(K_USER,id); enterApp(); }
function changeUser(){ currentUser=null; store.set(K_USER,null);
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').style.display='grid'; }
function enterApp(){
  const u=TEAM.find(p=>p.id===currentUser);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('userAvatar').textContent=u.av;
  document.getElementById('userName').textContent=u.name.split(' ')[0]+(u.nick?` (${u.nick})`:'');
  currentView='moji';
  document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.toggle('on',x.dataset.view==='moji'));
  render();
}

// ===================== ROK LOGIKA =====================
function rokInfo(dateStr){
  if(!dateStr) return {cls:'', txt:'bez roka', days:9999};
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  const days=Math.round((d-today)/86400000);
  let cls,txt;
  if(days<0){ cls='over'; txt=`prošlo ${Math.abs(days)} d`; }
  else if(days===0){ cls='over'; txt='danas!'; }
  else if(days<=3){ cls='soon'; txt=`za ${days} d`; }
  else if(days<=7){ cls='soon'; txt=`za ${days} d`; }
  else { cls='ok'; txt=`za ${days} d`; }
  return {cls,txt,days};
}
function fmtDate(s){ if(!s)return''; const d=new Date(s);
  return d.toLocaleDateString('sr-RS',{day:'2-digit',month:'2-digit',year:'numeric'}); }

// ===================== ODOBRAVANJE =====================
// Milan: uvek. Sofija: pon-pet 08:00-14:59. Ostali: ne.
function canApprove(userId){
  if(userId==='milan') return true;
  if(userId==='sofija'){
    const now=new Date();
    const day=now.getDay();          // 0=ned, 1=pon ... 6=sub
    const hour=now.getHours();
    return day>=1 && day<=5 && hour>=8 && hour<15;
  }
  return false;
}
function sofijaWindowMsg(){
  return 'Odobravanje je za Sofiju dostupno radnim danom 08–15h';
}
function approveTask(id, ev){
  if(ev) ev.stopPropagation();
  const t=tasks.find(x=>x.id===id); if(!t) return;
  if(!canApprove(currentUser)){ showToast(sofijaWindowMsg(),true); return; }
  t.approved=true; t.approvedBy=currentUser;
  save(); render(); showToast('Zadatak odobren ✓');
}
function updatePendBadge(){
  const n=tasks.filter(t=>!t.approved).length;
  const b=document.getElementById('pendBadge');
  if(n>0){ b.textContent=n; b.style.display='inline-block'; }
  else b.style.display='none';
}

// ===================== KALENDAR (7 dana) =====================
let calOffset=0; // 0 = nedelja koja počinje danas
function calStart(){
  const s=new Date(); s.setHours(0,0,0,0); s.setDate(s.getDate()+calOffset*7); return s;
}
function calMove(dir){ calOffset+=dir; render(); }
function calToday(){ calOffset=0; render(); }

const DNI=['Nedelja','Ponedeljak','Utorak','Sreda','Četvrtak','Petak','Subota'];
function renderCalendar(){
  const list=document.getElementById('taskList');
  const start=calStart();
  const end=new Date(start); end.setDate(end.getDate()+6);
  const todayStr=new Date().toISOString().slice(0,10);

  let html=`<div class="cal-head">
    <div class="cal-range">${start.toLocaleDateString('sr-RS',{day:'2-digit',month:'short'})} – ${end.toLocaleDateString('sr-RS',{day:'2-digit',month:'short',year:'numeric'})}</div>
    <div class="cal-nav">
      <button onclick="calMove(-1)" title="Prethodna nedelja">‹</button>
      <button onclick="calToday()" title="Danas" style="width:auto;padding:0 12px;font-size:13px">Danas</button>
      <button onclick="calMove(1)" title="Sledeća nedelja">›</button>
    </div>
  </div><div class="cal-grid">`;

  for(let i=0;i<7;i++){
    const day=new Date(start); day.setDate(day.getDate()+i);
    const dayStr=day.toISOString().slice(0,10);
    const dow=day.getDay();
    const isToday=dayStr===todayStr;
    const isWeekend=dow===0||dow===6;
    // zadaci za taj dan (po roku)
    const dayTasks=tasks.filter(t=>t.date===dayStr)
      .sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
    html+=`<div class="cal-day ${isToday?'today':''} ${isWeekend?'weekend':''}">
      <div class="cal-day-h ${isToday?'today-h':''}">
        <span class="dname">${DNI[dow]}<small>${day.getDate()}.${day.getMonth()+1}.</small></span>
        <span class="dcount">${dayTasks.length||''}</span>
      </div>
      <div class="cal-items">`;
    if(dayTasks.length===0){
      html+=`<div class="cal-empty">—</div>`;
    } else {
      html+=dayTasks.map(t=>{
        const who=TEAM.find(p=>p.id===t.who)||{name:'?'};
        const r=rokInfo(t.date);
        const dot = !t.approved ? 'ci-pend' : (t.status==='gotovo'?'ci-ok':r.cls==='over'?'ci-over':r.cls==='soon'?'ci-soon':'ci-ok');
        return `<div class="cal-item" onclick="openEdit('${t.id}')">
          <span class="ci-dot ${dot}"></span>
          <div class="ci-body">
            <div class="ci-type">${esc(shortType(t.type))}</div>
            <div class="ci-sub">${t.time?'🕑 '+t.time+' · ':''}${who.name.split(' ')[0]}${t.num?' · <span class="ci-num">'+esc(t.num)+'</span>':''}${!t.approved?' · ⏳':''}</div>
          </div>
        </div>`;
      }).join('');
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  list.innerHTML=html;
}

// ===================== RENDER =====================
function render(){
  updatePendBadge();
  // kalendar je poseban prikaz
  if(currentView==='kalendar'){ renderStats(); renderCalendar(); return; }

  renderStats();
  const list=document.getElementById('taskList');
  let arr=[...tasks];

  if(currentView==='moji') arr=arr.filter(t=>t.who===currentUser);
  else if(currentView==='odob') arr=arr.filter(t=>!t.approved);

  const sort=document.getElementById('sortSel').value;
  if(sort==='rok') arr.sort((a,b)=>(rokInfo(a.date).days)-(rokInfo(b.date).days));
  else if(sort==='tip') arr.sort((a,b)=>a.type.localeCompare(b.type,'sr'));
  else arr.sort((a,b)=>b.created-a.created);

  if(arr.length===0){
    const msg = currentView==='odob' ? 'Nema zadataka na čekanju — sve je odobreno ✓'
      : currentView==='moji' ? 'Nemaš dodeljenih zadataka.'
      : 'Dodaj prvi zadatak dugmetom dole.';
    list.innerHTML=`<div class="empty"><div class="big">${currentView==='odob'?'✅':'📋'}</div><b>Nema zadataka</b>${msg}</div>`;
    return;
  }

  if(currentView==='osobe'){
    let html='';
    TEAM.forEach(p=>{
      const pt=arr.filter(t=>t.who===p.id);
      if(pt.length===0) return;
      html+=`<div class="group-h">${p.name} <span class="count">${pt.length}</span></div>`;
      html+=pt.map(taskCard).join('');
    });
    list.innerHTML=html;
  } else {
    list.innerHTML=arr.map(taskCard).join('');
  }
}

function renderStats(){
  const mine = currentView==='moji' ? tasks.filter(t=>t.who===currentUser) : tasks;
  const active=mine.filter(t=>t.status!=='gotovo');
  let over=0,soon=0,ok=0;
  active.forEach(t=>{ const r=rokInfo(t.date); if(r.days<=0)over++; else if(r.days<=7)soon++; else ok++; });
  document.getElementById('stats').innerHTML=`
    <div class="stat urgent"><div class="n">${over}</div><div class="l">Hitno / isteklo</div></div>
    <div class="stat soon"><div class="n">${soon}</div><div class="l">Ove nedelje</div></div>
    <div class="stat ok"><div class="n">${ok}</div><div class="l">Kasnije</div></div>
    <div class="stat total"><div class="n">${active.length}</div><div class="l">Ukupno aktivnih</div></div>`;
}

function taskCard(t){
  const r=rokInfo(t.date);
  const who=TEAM.find(p=>p.id===t.who)||{name:'?',av:'?'};
  const pendingCls = !t.approved ? 't-pending' : '';
  const dueClass = t.status==='gotovo' ? 'done' : (r.cls==='over'?'due-over':r.cls==='soon'?'due-soon':r.cls==='ok'?'due-ok':'');
  const stClass={'otvoreno':'st-otvoreno','u-toku':'st-utoku','gotovo':'st-gotovo'}[t.status];
  const stTxt={'otvoreno':'Otvoreno','u-toku':'U toku','gotovo':'Gotovo'}[t.status];
  const timeStr = t.time ? ' u '+t.time : '';

  // approval traka
  let approveHtml='';
  if(!t.approved){
    if(canApprove(currentUser)){
      approveHtml=`<div class="approve-bar">
        <button class="btn-approve" onclick="approveTask('${t.id}',event)">✓ Odobri zadatak</button>
      </div>`;
    } else {
      approveHtml=`<div class="approve-note">⏳ Čeka odobrenje (Milan ili Sofija)</div>`;
    }
  }

  return `<div class="task ${dueClass} ${pendingCls}" onclick="openEdit('${t.id}')">
    <div class="t-top">
      <div>
        <div class="t-title">${esc(t.type)}</div>
        <div class="t-num mono">${esc(t.num||'—')}</div>
      </div>
      ${!t.approved?'<span class="pend-tag">⏳ Čeka</span>':`<span class="t-badge ${typeClass(t.type)}">${esc(shortType(t.type))}</span>`}
    </div>
    <div class="t-meta">
      <span class="t-rok ${r.cls}">🕑 ${r.txt}${t.date?' · '+fmtDate(t.date)+timeStr:''}</span>
      <span class="t-who"><span class="avatar">${who.av}</span>${who.name.split(' ')[0]}</span>
      <span class="t-status ${stClass}">${stTxt}</span>
    </div>
    ${t.note?`<div class="t-note">${esc(t.note)}</div>`:''}
    ${approveHtml}
  </div>`;
}
function shortType(t){ return t.length>22?t.slice(0,20)+'…':t; }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ===================== MODAL =====================
function openNew(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Novi zadatak';
  document.getElementById('fNum').value='';
  document.getElementById('fType').value=TYPES[0].v;
  document.getElementById('fOther').value='';
  document.getElementById('fWho').value=currentUser;
  document.getElementById('fDate').value='';
  document.getElementById('fTime').value='';
  document.getElementById('fStatus').value='otvoreno';
  document.getElementById('fNote').value='';
  document.getElementById('delBtn').style.display='none';
  toggleOther();
  document.getElementById('overlay').classList.add('open');
}
function openEdit(id){
  const t=tasks.find(x=>x.id===id); if(!t)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Izmeni zadatak';
  // ako je tip custom (Ostalo), prikaži ga
  const known=TYPES.find(y=>y.v===t.type);
  if(known){ document.getElementById('fType').value=t.type; document.getElementById('fOther').value=''; }
  else { document.getElementById('fType').value='Ostalo'; document.getElementById('fOther').value=t.type; }
  document.getElementById('fNum').value=t.num||'';
  document.getElementById('fWho').value=t.who;
  document.getElementById('fDate').value=t.date||'';
  document.getElementById('fTime').value=t.time||'';
  document.getElementById('fStatus').value=t.status;
  document.getElementById('fNote').value=t.note||'';
  document.getElementById('delBtn').style.display='inline-flex';
  toggleOther();
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function toggleOther(){
  const isOther=document.getElementById('fType').value==='Ostalo';
  document.getElementById('otherWrap').style.display=isOther?'block':'none';
}
function saveTask(){
  const typeSel=document.getElementById('fType').value;
  const other=document.getElementById('fOther').value.trim();
  const finalType = typeSel==='Ostalo' ? (other||'Ostalo') : typeSel;
  const num=document.getElementById('fNum').value.trim();
  const obj={
    num, type:finalType,
    who:document.getElementById('fWho').value,
    date:document.getElementById('fDate').value,
    time:document.getElementById('fTime').value,
    status:document.getElementById('fStatus').value,
    note:document.getElementById('fNote').value.trim(),
  };
  if(editingId){
    const t=tasks.find(x=>x.id===editingId);
    Object.assign(t,obj);
  } else {
    obj.id=uid(); obj.created=Date.now();
    // auto-odobravanje ako onaj ko unosi ima pravo (Milan uvek, Sofija u radno vreme)
    if(canApprove(currentUser)){ obj.approved=true; obj.approvedBy=currentUser; }
    else { obj.approved=false; obj.approvedBy=null; }
    tasks.unshift(obj);
  }
  // dodaj broj u predmete ako je nov
  if(num && !predmeti.includes(num)){ predmeti.push(num); refreshPredmetiList(); }
  save(); closeModal(); render();
  let msg = editingId ? 'Zadatak izmenjen ✓' : (obj.approved ? 'Zadatak dodat i odobren ✓' : 'Zadatak dodat — čeka odobrenje ⏳');
  showToast(msg);
}
function delTask(){
  if(!editingId)return;
  if(!confirm('Obrisati ovaj zadatak?'))return;
  tasks=tasks.filter(x=>x.id!==editingId);
  save(); closeModal(); render();
  showToast('Zadatak obrisan');
}

// ===================== EXCEL IMPORT =====================
function handleExcel(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // pokušaj naći kolonu sa brojem predmeta
      let found=[];
      // ako prvi red izgleda kao header, traži kolonu "broj"
      let startRow=0, col=0;
      if(rows.length){
        const hdr=rows[0].map(x=>String(x).toLowerCase());
        const idx=hdr.findIndex(h=>h.includes('broj')||h.includes('predmet')||h.includes('spis'));
        if(idx>=0){ col=idx; startRow=1; }
      }
      for(let i=startRow;i<rows.length;i++){
        const val=String(rows[i][col]||'').trim();
        if(val) found.push(val);
      }
      found=[...new Set(found)];
      if(found.length===0){ showToast('Excel pročitan, ali nije nađen nijedan broj predmeta.',true); return; }
      // spoji sa postojećim
      const before=predmeti.length;
      found.forEach(f=>{ if(!predmeti.includes(f)) predmeti.push(f); });
      refreshPredmetiList(); save();
      showToast(`Uvezeno ${found.length} predmeta (${predmeti.length-before} novih) ✓`);
    }catch(err){
      showToast('Greška pri čitanju Excel-a: '+err.message,true);
    }
    e.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' err':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3200);
}

// close modal on overlay click
document.getElementById('overlay').onclick=(e)=>{ if(e.target.id==='overlay') closeModal(); };

// PWA service worker (za instalaciju ikone na telefon)
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}

init();
</script>
